name: Publish Physics Battle

on:
  schedule:
    - cron: '0 0 * * *'   # 毎日 UTC 00:00 (JST 09:00)
    - cron: '0 8 * * *'   # 毎日 UTC 08:00 (JST 17:00)
    - cron: '0 16 * * *'  # 毎日 UTC 16:00 (JST 01:00)
  workflow_dispatch:        # 手動実行も可能

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out engine
        uses: actions/checkout@v4
        with:
          repository: aa-0921/youtube-auto-engine
          path: engine
          token: ${{ secrets.GH_PAT }}

      - name: Check out physics-anim-core
        uses: actions/checkout@v4
        with:
          repository: aa-0921/physics-anim-core
          path: physics-anim-core
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: sudo apt-get install -y ffmpeg

      - name: Install dependencies
        working-directory: engine
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Start sketch server
        run: |
          python3 -m http.server 8080 --directory physics-anim-core/src &
          sleep 2

      - name: Run physics battle pipeline
        working-directory: engine
        env:
          YT_PHYSICS_BATTLE_CLIENT_ID: ${{ secrets.YT_PHYSICS_BATTLE_CLIENT_ID }}
          YT_PHYSICS_BATTLE_CLIENT_SECRET: ${{ secrets.YT_PHYSICS_BATTLE_CLIENT_SECRET }}
          YT_PHYSICS_BATTLE_REFRESH_TOKEN: ${{ secrets.YT_PHYSICS_BATTLE_REFRESH_TOKEN }}
          TT_PHYSICS_BATTLE_CLIENT_KEY: ${{ secrets.TT_PHYSICS_BATTLE_CLIENT_KEY }}
          TT_PHYSICS_BATTLE_CLIENT_SECRET: ${{ secrets.TT_PHYSICS_BATTLE_CLIENT_SECRET }}
          TT_PHYSICS_BATTLE_REFRESH_TOKEN: ${{ secrets.TT_PHYSICS_BATTLE_REFRESH_TOKEN }}
        run: python cli.py run physics-battle

      - name: Run physics escalation pipeline
        working-directory: engine
        env:
          YT_PHYSICS_BATTLE_CLIENT_ID: ${{ secrets.YT_PHYSICS_BATTLE_CLIENT_ID }}
          YT_PHYSICS_BATTLE_CLIENT_SECRET: ${{ secrets.YT_PHYSICS_BATTLE_CLIENT_SECRET }}
          YT_PHYSICS_BATTLE_REFRESH_TOKEN: ${{ secrets.YT_PHYSICS_BATTLE_REFRESH_TOKEN }}
          TT_PHYSICS_BATTLE_CLIENT_KEY: ${{ secrets.TT_PHYSICS_BATTLE_CLIENT_KEY }}
          TT_PHYSICS_BATTLE_CLIENT_SECRET: ${{ secrets.TT_PHYSICS_BATTLE_CLIENT_SECRET }}
          TT_PHYSICS_BATTLE_REFRESH_TOKEN: ${{ secrets.TT_PHYSICS_BATTLE_REFRESH_TOKEN }}
        run: python cli.py run physics-escalation

      - name: Persist history
        working-directory: engine
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add channels/physics-battle/history.json channels/physics-escalation/history.json
          # cli.py 実行中に他のファイルが modified 状態になることがあるため
          # --autostash で git pull --rebase が unstaged 変更で失敗しないようにする
          git diff --staged --quiet || (git commit -m "chore: update battle/escalation history" && git pull --rebase --autostash && git push)
